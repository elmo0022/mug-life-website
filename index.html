<!DOCTYPE html>
<html>
<head>
    <title>Mug Life Coffee</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAV -->
    <nav>
        <h2>Mug Life ☕</h2>
        <div>
            <a href="#menu">Menu</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <!-- HERO -->
    <section id="home">
        <h1>Welcome to Mug Life ☕</h1>
    </section>

    <!-- MENU -->
    <section id="menu">
        <h2>Our Menu</h2>

        <div class="menu-container">

            <div class="menu-item">
                <img src="./espresso.jpg">
                <h3>☕ Espresso</h3>
                <p>Strong and bold coffee shot.</p>
                <span>$4.50</span>
            </div>

            <div class="menu-item">
                <img src="./latte.jpg">
                <h3>🥛 Latte</h3>
                <p>Smooth blend of coffee and milk.</p>
                <span>$5.50</span>
            </div>

            <div class="menu-item">
                <img src="./mocha.jpg">
                <h3>🍫 Mocha</h3>
                <p>Chocolate flavored coffee delight.</p>
                <span>$5.75</span>
            </div>

            <div class="menu-item">
                <img src="./iced-coffee.jpg">
                <h3>🧊 Iced Coffee</h3>
                <p>Chilled coffee for a refreshing taste.</p>
                <span>$5.00</span>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Mug Life Coffee</p>
    </footer>

</body>
</html>
